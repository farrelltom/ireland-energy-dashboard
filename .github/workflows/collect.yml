name: Collect & Publish

on:
  schedule:
    # 06:00 UTC daily — after EirGrid's midnight-to-midnight data settles
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to collect (YYYY-MM-DD). Defaults to today UTC."
        required: false

# Serialize all runs. cancel-in-progress: false means a second trigger queues
# rather than killing a mid-run pipeline (which would leave a partial commit).
concurrency:
  group: data-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

# GitHub-hosted runners are deprecating Node 20 for JavaScript actions.
# Opt in now so checkout/setup-python run on Node 24 already.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so git diff and log work correctly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run pipeline
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          cd python && python main.py $DATE_ARG

      - name: Commit updated data and site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ github.event.repository.default_branch }}"

          git add data/canonical/ data/insights/ docs/

          # Only commit if something changed
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"

            # Remote may have advanced since checkout (e.g. manual commits).
            # Rebase and retry push to avoid non-fast-forward workflow failures.
            pushed=false
            for i in 1 2 3; do
              git pull --rebase origin "$BRANCH"
              if git push origin "HEAD:$BRANCH"; then
                pushed=true
                break
              fi
              echo "Push attempt $i failed; retrying..."
              sleep 2
            done

            if [ "$pushed" != true ]; then
              echo "Failed to push after retries."
              exit 1
            fi
          fi

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull the latest commit on the repository default branch
          # (handles master/main naming without hard-coding)
          ref: ${{ github.event.repository.default_branch }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
